<div class="table-wrap">
  <table class="deliveries-table">
    <thead>
      <tr>
        <th>Periodo</th>
        <th>Entrega</th>
        <th>Tipo</th>
        <th>Impacto esperado</th>
      </tr>
    </thead>
    <tbody>
      @for (row of rows(); track row.delivery) {
        <tr>
          <td><span class="status-pill" [class]="row.periodTone" tuiBadge>{{ row.period }}</span></td>
          <td>{{ row.delivery }}</td>
          <td>{{ row.type }}</td>
          <td>{{ row.expectedImpact }}</td>
        </tr>
      }
    </tbody>
  </table>
</div>
