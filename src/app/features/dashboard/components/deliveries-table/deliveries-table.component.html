<div class="table-wrap">
  <table class="deliveries-table">
    <thead>
      <tr>
        <th>Periodo</th>
        <th>Entrega</th>
        <th>Tipo</th>
        <th>Impacto esperado</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of rows()">
        <td><span class="status-pill" [ngClass]="row.periodTone" tuiBadge>{{ row.period }}</span></td>
        <td>{{ row.delivery }}</td>
        <td>{{ row.type }}</td>
        <td>{{ row.expectedImpact }}</td>
      </tr>
    </tbody>
  </table>
</div>
