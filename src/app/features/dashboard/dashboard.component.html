<main class="dashboard">
  <app-header></app-header>

  <section class="dashboard-content">
    <div class="main-grid">
      <app-section-label text="01 · diagnostico atual"></app-section-label>

      <div class="diag-grid">
        <app-diagnostic-card
          *ngFor="let card of diagnosticCards"
          [card]="card"
        ></app-diagnostic-card>
      </div>

      <article class="alert-box">
        <h3 class="alert-title">⚡ {{ focusAlert.title }}</h3>
        <p>{{ focusAlert.body }}</p>
      </article>

      <app-section-label text="02 · trilha de desenvolvimento — fases"></app-section-label>

      <section class="timeline">
        <app-phase-block
          *ngFor="let phase of phases"
          [phase]="phase"
        ></app-phase-block>
      </section>

      <app-section-label text="03 · certificacoes — roadmap"></app-section-label>

      <div class="cert-grid">
        <app-cert-card
          *ngFor="let cert of certifications"
          [cert]="cert"
        ></app-cert-card>
      </div>

      <app-section-label text="04 · entregas mensuraveis — por trimestre"></app-section-label>
      <app-deliveries-table [rows]="deliveries"></app-deliveries-table>

      <app-section-label text="05 · como se posicionar para pleno"></app-section-label>

      <div class="pos-grid">
        <app-position-card
          *ngFor="let card of positionCards"
          [card]="card"
        ></app-position-card>
      </div>

      <footer class="dashboard-footer">
        <span>Copyright © 2026
          <em class="link">
            <a href="https://elizabetesousafabri.com.br/" target="_blank" rel="noopener">Elizabete Fabri</a>
          </em>.
        </span>
        <span>"Nada substitui a persistência, nem mesmo o talento."</span>
      </footer>
    </div>
  </section>
</main>
